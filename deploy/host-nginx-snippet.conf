# Host nginx snippet — add to your server-wide nginx (ports 80/443)
# SSL certs live on the HOST, not in Docker.
# This app Docker stack only binds to 127.0.0.1:8888

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name winningblueprints.com www.winningblueprints.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name winningblueprints.com www.winningblueprints.com;

    ssl_certificate     /etc/letsencrypt/live/winningblueprints.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winningblueprints.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}

# Optional: IP access via HTTPS (if cert covers IP or use self-signed for IP only)
