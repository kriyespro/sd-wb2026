# Winning Blueprints — listens on 8888 only (host reverse proxy handles SSL)
# Host nginx should proxy: https://winningblueprints.com → http://127.0.0.1:8888

upstream django_app {
    server web:8000;
}

server {
    listen 8888;
    server_name winningblueprints.com www.winningblueprints.com 159.195.52.197 _;

    client_max_body_size 20M;

    # Security headers (HSTS set by host SSL proxy)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through HTTPS flag from host reverse proxy
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
